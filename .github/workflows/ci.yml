name: CI Pipeline
 
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
 
permissions:
  contents: read
 
jobs:
  test:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: List repository files
        run: ls -la
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask
 
      - name: Verify app.py exists
        run: |
          if [ ! -f app.py ]; then
            echo "ERROR: app.py not found"
            exit 1
          fi
          echo "app.py found ✅"
 
      - name: Run Flask health check
        run: |
          python app.py &
          APP_PID=$!
          echo "Flask started with PID $APP_PID"
          # Wait up to 15 seconds for Flask to start
          for i in {1..15}; do
            if curl -s http://localhost:5000/health > /dev/null; then
              echo "Flask is up ✅"
              break
            fi
            echo "Waiting for Flask... attempt $i"
            sleep 1
          done
          # Test the health endpoint
          RESPONSE=$(curl -s http://localhost:5000/health)
          echo "Response: $RESPONSE"
          # Verify response contains expected field
          if echo "$RESPONSE" | grep -q "status"; then
            echo "Health check passed ✅"
          else
            echo "Health check failed ❌"
            kill $APP_PID
            exit 1
          fi
          kill $APP_PID

      - name: Verify secret is configured
        env:
          APP_SECRET: ${{ secrets.MY_APP_SECRET }}
        run: |
          # Never print the secret value — check it exists and has content
          if [ -z "$APP_SECRET" ]; then
            echo "ERROR: MY_APP_SECRET is not configured ❌"
            exit 1
          fi
          echo "Secret is configured ✅"
          echo "Secret length: ${#APP_SECRET} characters"
          # GitHub automatically redacts secrets from logs
          # but we never print them anyway — good habit
